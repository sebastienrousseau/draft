run:
  timeout: 3m
  tests: true

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - gosimple
    - misspell
    - unconvert
    - gocritic
    - revive

issues:
  exclude-rules:
    # Test helpers routinely ignore write errors on temp files.
    - path: _test\.go
      linters:
        - errcheck
  max-issues-per-linter: 0
  max-same-issues: 0
