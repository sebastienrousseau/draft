name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.24"
          cache: true
      - name: Install PDF tooling
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Verify formatting
        run: test -z "$(gofmt -s -l .)"
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        run: go test -race ./...
      - name: Coverage gate (>=95%, excluding demo examples)
        run: |
          go test -coverprofile=coverage.out ./...
          grep -v '/examples/' coverage.out > coverage.filtered.out
          pct=$(go tool cover -func=coverage.filtered.out | awk '/^total:/ {print substr($3, 1, length($3)-1)}')
          echo "total coverage (excluding examples): ${pct}%"
          awk -v p="$pct" 'BEGIN { exit (p+0 >= 95 ? 0 : 1) }' || { echo "coverage ${pct}% is below 95%"; exit 1; }
      - name: Build
        run: go build ./...

  test-matrix:
    name: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.24"
          cache: true
      - name: Install PDF tooling (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Install PDF tooling (macOS)
        if: runner.os == 'macOS'
        run: brew install poppler
      - name: Test
        run: go test ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.24"
          cache: true
      - uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: v2.1.6
          # Skip the remote JSON-schema fetch (flaky CDN); config is verified locally.
          verify: false

  reuse:
    name: reuse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: REUSE compliance
        uses: fsfe/reuse-action@bb774aa972c2a89ff34781233d275075cbddf542 # v5
