name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.24"
          cache: true
      - name: Install PDF tooling
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Verify formatting
        run: test -z "$(gofmt -s -l .)"
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        run: go test -race ./...
      - name: Coverage gate (>=95%, excluding demo examples)
        run: |
          go test -coverprofile=coverage.out ./...
          grep -v '/examples/' coverage.out > coverage.filtered.out
          pct=$(go tool cover -func=coverage.filtered.out | awk '/^total:/ {print substr($3, 1, length($3)-1)}')
          echo "total coverage (excluding examples): ${pct}%"
          awk -v p="$pct" 'BEGIN { exit (p+0 >= 95 ? 0 : 1) }' || { echo "coverage ${pct}% is below 95%"; exit 1; }
      - name: Build
        run: go build ./...

  test-matrix:
    name: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.24"
          cache: true
      - name: Install PDF tooling (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Install PDF tooling (macOS)
        if: runner.os == 'macOS'
        run: brew install poppler
      - name: Test
        run: go test ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.24"
          cache: true
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.1.6
          # Skip the remote JSON-schema fetch (flaky CDN); config is verified locally.
          verify: false

  reuse:
    name: reuse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: REUSE compliance
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0
