version: "2"

run:
  timeout: 3m

linters:
  # Default set (errcheck, govet, ineffassign, staticcheck, unused) plus extras.
  enable:
    - revive
    - misspell
    - unconvert
    - gocritic
  settings:
    errcheck:
      # Writes to stderr/stdout and best-effort cleanup are intentionally
      # unchecked.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close
        - os.RemoveAll
    revive:
      rules:
        - name: unused-parameter
          disabled: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
          - revive
